<?xml version="1.0" encoding="UTF-8"?>
<!--
  HOA.africa master logo — green house silhouette with Africa map inside and
  connected nodes overlaying the continent.

  Two gradients keep the brand bright on light surfaces; for dark surfaces use
  `logo-on-dark.svg`. The mark renders cleanly from 16px (favicon) up to
  poster-size.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="HOA.africa">
  <defs>
    <linearGradient id="houseStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7CC04C"/>
      <stop offset="100%" stop-color="#3F8B22"/>
    </linearGradient>
    <linearGradient id="africaFill" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#7BBE45"/>
      <stop offset="100%" stop-color="#3D8A20"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fbfaf9"/>
      <stop offset="100%" stop-color="#f3efea"/>
    </radialGradient>
  </defs>

  <!-- soft cream background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- House outline — rounded roof + body. Generous stroke to read at small sizes. -->
  <path d="M256 70 L96 222 L96 432 Q96 444 108 444 L404 444 Q416 444 416 432 L416 222 Z"
        fill="none" stroke="url(#houseStroke)" stroke-width="22" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Leaves growing from the upper-right of the roof — a stylized 3-leaf branch. -->
  <g stroke="url(#houseStroke)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M400 120 Q430 88 460 96"/>
    <path d="M412 100 Q428 82 452 80"/>
    <path d="M428 96 Q444 78 470 76"/>
  </g>
  <g fill="url(#africaFill)" opacity="0.92">
    <ellipse cx="442" cy="88" rx="22" ry="13" transform="rotate(-28 442 88)"/>
    <ellipse cx="458" cy="72" rx="18" ry="10" transform="rotate(-32 458 72)"/>
  </g>

  <!-- Africa silhouette — simplified continent shape, centred inside the house body. -->
  <path d="M232 180
           Q210 178 200 200
           Q190 224 198 252
           Q200 270 212 286
           Q220 296 218 312
           Q216 326 222 342
           Q230 366 248 384
           Q256 392 260 404
           Q264 416 274 410
           Q288 400 296 384
           Q310 360 318 332
           Q326 304 322 280
           Q318 256 304 234
           Q288 210 268 196
           Q252 184 232 180 Z"
        fill="url(#africaFill)"/>

  <!-- Network of connected nodes overlaying the continent — six dots + lines. -->
  <g stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.85">
    <line x1="248" y1="218" x2="282" y2="244"/>
    <line x1="282" y1="244" x2="262" y2="280"/>
    <line x1="262" y1="280" x2="296" y2="306"/>
    <line x1="262" y1="280" x2="240" y2="320"/>
    <line x1="240" y1="320" x2="272" y2="356"/>
    <line x1="282" y1="244" x2="232" y2="242"/>
  </g>
  <g fill="#ffffff">
    <circle cx="248" cy="218" r="7"/>
    <circle cx="282" cy="244" r="9"/>
    <circle cx="232" cy="242" r="6"/>
    <circle cx="262" cy="280" r="9"/>
    <circle cx="296" cy="306" r="7"/>
    <circle cx="240" cy="320" r="6"/>
    <circle cx="272" cy="356" r="7"/>
  </g>
</svg>
