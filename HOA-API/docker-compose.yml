services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hoa
      POSTGRES_PASSWORD: hoa_dev_password
      POSTGRES_DB: hoa_africa
    ports:
      - '5435:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6385:6379'
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
